services:
  - type: web
    name: agent-pm-app
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agent-pm-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: agent-pm-db
    plan: free
